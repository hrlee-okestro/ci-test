name: Full CI/CD Pipeline Demo

on:
  push:
    branches: ["main"]

# GitHub Pages 배포 권한
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. 빌드 단계 (시연을 위해 빌드 결과물을 생성하는 척함)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          echo "프로젝트를 빌드 중입니다..."
          mkdir -p build_output
          cp index.html build_output/
          echo "빌드가 완료되었습니다."

  # 2. 테스트 단계 (빌드가 완료된 후 실행)
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Unit Tests
        run: |
          echo "테스트 케이스를 실행 중입니다..."
          # 실제 테스트 대신 성공 메시지 출력
          echo "모든 테스트를 통과했습니다! (Pass)"

  # 3. 배포 단계 (테스트까지 통과해야 실행)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # index.html이 있는 위치

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4